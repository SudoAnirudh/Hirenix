name: Bug Report
description: Create a report to help us improve Hirenix
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please read our [Contributing Guidelines](https://github.com/SudoAnirudh/Hirenix/blob/main/CONTRIBUTING.md) before submitting.
  - type: input
    id: title
    attributes:
      label: Bug Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: OS, Browser, Node Version, Python Version, etc.
      value: |
        - OS: [e.g. macOS v14, Windows 11]
        - Browser: [e.g. Chrome 120]
        - Node Version: [e.g. 20.x]
        - Python Version: [e.g. 3.11]
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Visual Evidence
      description: Add any screenshots, GIFs, or logs (if applicable).
    validations:
      required: false
