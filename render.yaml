services:
  # Backend FastAPI Service
  - type: web
    name: hirenix-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_ENV
        value: production
      # We will set ALLOWED_ORIGINS to the frontend URL dynamically
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: hirenix-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend Next.js Service
  - type: web
    name: hirenix-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # Automatically points to the backend URL on Render
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: hirenix-backend
          envVarKey: RENDER_EXTERNAL_URL
